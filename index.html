<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OxideBlog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1419;
        --bg-elevated: #1a222d;
        --surface: #232d3b;
        --border: rgba(255, 255, 255, 0.08);
        --text: #e8eaed;
        --text-muted: #9aa5b1;
        --accent: #3d9cf0;
        --accent-hover: #5cb0ff;
        --danger: #f07178;
        --danger-bg: rgba(240, 113, 120, 0.12);
        --success: #7fd99a;
        --radius: 12px;
        --radius-sm: 8px;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        --font: "DM Sans", system-ui, -apple-system, sans-serif;
        --mono: "JetBrains Mono", ui-monospace, monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font);
        font-size: 15px;
        line-height: 1.55;
        color: var(--text);
        background: radial-gradient(ellipse 120% 80% at 50% -20%, #1a3a52 0%, var(--bg) 45%);
        background-attachment: fixed;
      }

      .shell {
        max-width: 1080px;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }

      .hero {
        margin-bottom: 2rem;
      }

      .hero h1 {
        margin: 0 0 0.35rem;
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .hero p {
        margin: 0;
        color: var(--text-muted);
        font-size: 0.95rem;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1rem;
        padding: 0.45rem 0.85rem;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 0.875rem;
      }

      .status::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--text-muted);
      }

      .status.is-on::before {
        background: var(--success);
        box-shadow: 0 0 10px var(--success);
      }

      .layout {
        display: grid;
        gap: 1.25rem;
      }

      @media (min-width: 900px) {
        .layout {
          grid-template-columns: minmax(280px, 340px) 1fr;
          align-items: start;
        }
      }

      section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.25rem 1.35rem;
        box-shadow: var(--shadow);
      }

      section h2 {
        margin: 0 0 1rem;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
      }

      .hint {
        margin: 0 0 1rem;
        font-size: 0.8125rem;
        color: var(--text-muted);
      }

      label {
        display: block;
        margin-bottom: 0.85rem;
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--text-muted);
      }

      label span {
        display: block;
        margin-bottom: 0.35rem;
      }

      input,
      textarea {
        width: 100%;
        padding: 0.65rem 0.75rem;
        font-family: var(--font);
        font-size: 0.9375rem;
        color: var(--text);
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(61, 156, 240, 0.2);
      }

      textarea {
        resize: vertical;
        min-height: 88px;
      }

      .row {
        display: grid;
        gap: 0.75rem;
      }

      @media (min-width: 520px) {
        .row.cols-3 {
          grid-template-columns: repeat(3, 1fr);
        }
        .row.cols-2 {
          grid-template-columns: 1fr 1fr;
        }
      }

      /* Регистрация: три колонки с выровненными по линии полями ввода */
      .reg-fields {
        align-items: stretch;
      }

      .reg-fields > label {
        margin-bottom: 0;
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .reg-fields > label > span {
        display: flex;
        align-items: flex-end;
        min-height: 2.75rem;
        margin-bottom: 0.35rem;
        line-height: 1.25;
      }

      .reg-fields > label input {
        flex-shrink: 0;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }

      button {
        cursor: pointer;
        font-family: var(--font);
        font-size: 0.875rem;
        font-weight: 600;
        padding: 0.55rem 1rem;
        border-radius: var(--radius-sm);
        border: 1px solid transparent;
        transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.05s;
      }

      button:active {
        transform: scale(0.98);
      }

      .btn-primary {
        background: var(--accent);
        color: #0a0e12;
      }

      .btn-primary:hover {
        background: var(--accent-hover);
      }

      .btn-ghost {
        background: transparent;
        color: var(--text);
        border-color: var(--border);
      }

      .btn-ghost:hover {
        background: rgba(255, 255, 255, 0.06);
      }

      .btn-danger {
        background: var(--danger-bg);
        color: var(--danger);
        border-color: rgba(240, 113, 120, 0.35);
      }

      .btn-danger:hover {
        background: rgba(240, 113, 120, 0.22);
      }

      .section--locked {
        opacity: 0.55;
        pointer-events: none;
        filter: grayscale(0.15);
      }

      #posts {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
        margin-top: 1rem;
      }

      .post-card {
        padding: 1rem 1.1rem;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        transition: border-color 0.15s;
      }

      .post-card:hover {
        border-color: rgba(61, 156, 240, 0.25);
      }

      .post-card.is-mine {
        cursor: pointer;
        border-left: 3px solid var(--accent);
      }

      .post-card h3 {
        margin: 0 0 0.5rem;
        font-size: 1.05rem;
        font-weight: 600;
      }

      .post-meta {
        font-family: var(--mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-bottom: 0.65rem;
      }

      .post-body {
        margin: 0;
        color: var(--text);
        white-space: pre-wrap;
        word-break: break-word;
      }

      .post-actions {
        margin-top: 0.75rem;
      }

      #err {
        margin: 1.25rem 0 0;
        padding: 0.75rem 1rem;
        border-radius: var(--radius-sm);
        background: var(--danger-bg);
        border: 1px solid rgba(240, 113, 120, 0.35);
        color: #ffb4b8;
        font-size: 0.875rem;
        display: none;
      }

      #err:not(:empty) {
        display: block;
      }

      .stack-side,
      .stack-main {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <h1>OxideBlog</h1>
        <p>Личный блог на Rust · WASM + HTTP API</p>
        <p id="status" class="status" role="status"></p>
      </header>

      <div class="layout">
        <aside class="stack-side">
          <section>
            <h2>Сервер</h2>
            <label>
              <span>Base URL API</span>
              <input id="baseUrl" type="text" value="http://127.0.0.1:8080" autocomplete="url" />
            </label>
            <div class="actions">
              <button id="applyBase" class="btn-primary" type="button">Применить</button>
            </div>
          </section>

          <section>
            <h2>Регистрация</h2>
            <div class="row cols-3 reg-fields">
              <label>
                <span>Имя пользователя</span>
                <input id="regUser" autocomplete="username" />
              </label>
              <label>
                <span>Email</span>
                <input id="regEmail" type="email" autocomplete="email" />
              </label>
              <label>
                <span>Пароль</span>
                <input id="regPass" type="password" autocomplete="new-password" />
              </label>
            </div>
            <div class="actions">
              <button id="btnReg" class="btn-primary" type="button">Создать аккаунт</button>
            </div>
          </section>

          <section>
            <h2>Вход</h2>
            <div class="row cols-2">
              <label>
                <span>Имя пользователя</span>
                <input id="loginUser" autocomplete="username" />
              </label>
              <label>
                <span>Пароль</span>
                <input id="loginPass" type="password" autocomplete="current-password" />
              </label>
            </div>
            <div class="actions">
              <button id="btnLogin" class="btn-primary" type="button">Войти</button>
              <button id="btnLogout" class="btn-ghost" type="button">Выйти</button>
            </div>
          </section>
        </aside>

        <main class="stack-main">
          <section id="postEditor">
            <h2>Новый пост</h2>
            <label>
              <span>Заголовок</span>
              <input id="postTitle" />
            </label>
            <label>
              <span>Содержание</span>
              <textarea id="postContent" rows="5"></textarea>
            </label>
            <div class="actions">
              <button id="btnCreate" class="btn-primary" type="button">Опубликовать</button>
            </div>
          </section>

          <section>
            <h2>Редактирование</h2>
            <p class="hint">Нажмите на свой пост в списке ниже, чтобы подставить данные.</p>
            <div class="row cols-3">
              <label>
                <span>ID</span>
                <input id="editId" type="number" />
              </label>
              <label style="grid-column: span 2">
                <span>Заголовок</span>
                <input id="editTitle" />
              </label>
            </div>
            <label>
              <span>Содержание (необязательно)</span>
              <textarea id="editContent" rows="3"></textarea>
            </label>
            <div class="actions">
              <button id="btnUpdate" class="btn-primary" type="button">Сохранить</button>
            </div>
          </section>

          <section>
            <h2>Лента</h2>
            <div class="actions">
              <button id="btnRefresh" class="btn-ghost" type="button">Обновить</button>
            </div>
            <div id="posts"></div>
          </section>
        </main>
      </div>

      <p id="err" class="error" aria-live="polite"></p>
    </div>

    <script type="module">
      import init, { BlogApp } from "./pkg/blog_wasm.js";

      await init();
      const app = new BlogApp();
      const statusEl = document.getElementById("status");
      const errEl = document.getElementById("err");

      const setErr = (m) => {
        errEl.textContent = m ? String(m) : "";
      };

      const renderStatus = () => {
        const name = app.username();
        const id = app.user_id();
        const authed = app.is_authenticated();
        statusEl.textContent = authed
          ? `В сессии: ${name ?? "user"} · id ${id ?? "—"}`
          : "Гость · войдите или зарегистрируйтесь";
        statusEl.classList.toggle("is-on", authed);
        document.getElementById("postEditor").classList.toggle("section--locked", !authed);
      };

      document.getElementById("applyBase").onclick = () => {
        const v = document.getElementById("baseUrl").value.trim();
        app.set_base_url(v);
        setErr("");
        renderStatus();
      };

      document.getElementById("btnReg").onclick = async () => {
        setErr("");
        try {
          await app.register(
            document.getElementById("regUser").value,
            document.getElementById("regEmail").value,
            document.getElementById("regPass").value,
          );
          renderStatus();
          await refreshPosts();
        } catch (e) {
          setErr(e);
        }
      };

      document.getElementById("btnLogin").onclick = async () => {
        setErr("");
        try {
          await app.login(document.getElementById("loginUser").value, document.getElementById("loginPass").value);
          renderStatus();
          await refreshPosts();
        } catch (e) {
          setErr(e);
        }
      };

      document.getElementById("btnLogout").onclick = () => {
        app.logout();
        renderStatus();
      };

      document.getElementById("btnCreate").onclick = async () => {
        setErr("");
        try {
          await app.create_post(
            document.getElementById("postTitle").value,
            document.getElementById("postContent").value,
          );
          await refreshPosts();
        } catch (e) {
          setErr(e);
        }
      };

      document.getElementById("btnUpdate").onclick = async () => {
        setErr("");
        const id = document.getElementById("editId").value.trim();
        const content = document.getElementById("editContent").value;
        try {
          await app.update_post(
            id,
            document.getElementById("editTitle").value,
            content.length ? content : null,
          );
          await refreshPosts();
        } catch (e) {
          setErr(e);
        }
      };

      async function refreshPosts() {
        setErr("");
        const raw = await app.load_posts();
        const data = typeof raw === "string" ? JSON.parse(raw) : raw;
        if (!data || !Array.isArray(data.posts)) {
          const printable =
            data && typeof data === "object" ? JSON.stringify(data) : String(data);
          setErr(`Некорректный ответ /api/posts: ${printable}`);
          return;
        }
        const container = document.getElementById("posts");
        container.innerHTML = "";
        const uid = app.user_id();
        for (const p of data.posts) {
          const art = document.createElement("article");
          const isAuthor = uid != null && uid === String(p.author_id);
          art.className = "post-card" + (isAuthor ? " is-mine" : "");
          art.innerHTML = `
            <h3></h3>
            <p class="post-meta"></p>
            <p class="post-body"></p>
          `;
          art.querySelector("h3").textContent = p.title;
          art.querySelector(".post-meta").textContent = `#${p.id} · автор ${p.author_id}`;
          art.querySelector(".post-body").textContent = p.content;
          if (isAuthor) {
            const wrap = document.createElement("div");
            wrap.className = "post-actions";
            const del = document.createElement("button");
            del.type = "button";
            del.className = "btn-danger";
            del.textContent = "Удалить";
            del.onclick = async (ev) => {
              ev.stopPropagation();
              setErr("");
              try {
                await app.delete_post(String(p.id));
                await refreshPosts();
              } catch (e) {
                setErr(e);
              }
            };
            wrap.appendChild(del);
            art.appendChild(wrap);
          }
          art.addEventListener("click", () => {
            if (!isAuthor) return;
            document.getElementById("editId").value = String(p.id);
            document.getElementById("editTitle").value = p.title;
            document.getElementById("editContent").value = p.content;
          });
          container.appendChild(art);
        }
      }

      document.getElementById("btnRefresh").onclick = async () => {
        try {
          await refreshPosts();
        } catch (e) {
          setErr(e);
        }
      };

      renderStatus();
      refreshPosts().catch((e) => setErr(e));
    </script>
  </body>
</html>
